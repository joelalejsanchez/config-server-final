server:
  port: 8081

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes: 
        - id: api-service
          uri: lb://API-SERVICE
          predicates:
            - Path=/api/**

eureka:
  client:
    service-url:
      defaultZone: http://registry-server:8761/eureka
